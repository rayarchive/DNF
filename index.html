<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNF Graveyard 📚☠️</title>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --blood: #7a1a1a;
    --parchment: #f0e8d0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    font-family: 'IM Fell English', serif;
    color: #d4cfc8;
    overflow-x: hidden;
  }

  /* fundo escuro neutro — ideal para colocar imagem de cemitério via CSS */
  .bg {
    position: fixed;
    inset: 0;
    background-color: #0e100d;
    z-index: -2;
  }

  header {
    text-align: center;
    padding: 2.5rem 1rem 0.8rem;
  }
  header h1 {
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: clamp(2.2rem, 5.5vw, 4rem);
    color: var(--parchment);
    text-shadow: 0 0 28px rgba(201,168,76,0.55), 2px 2px 0 #000;
    letter-spacing: 2px;
  }
  header p {
    font-style: italic;
    color: #7a987a;
    margin-top: 0.4rem;
    font-size: 0.95rem;
    letter-spacing: 1px;
  }

  /* ══ GRAVEYARD ══ */
  #graveyard {
    display: flex;
    flex-wrap: wrap;
    gap: 2rem 1.5rem;
    justify-content: center;
    padding: 2rem 2rem 8rem;
    min-height: 300px;
    align-items: flex-end;
  }

  .empty-msg {
    font-style: italic;
    color: #4a6042;
    font-size: 1.05rem;
    text-align: center;
    width: 100%;
    padding: 3rem;
    text-shadow: 0 1px 3px #000;
    animation: pulse 3s ease-in-out infinite;
    align-self: center;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.9} }

  /* ══ LÁPIDE ══ */
  .tombstone-wrap {
    position: relative;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
  }

  .tombstone {
    width: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    animation: riseUp 0.65s cubic-bezier(0.16,1,0.3,1) both;
    position: relative;
  }
  @keyframes riseUp {
    from { opacity:0; transform: translateY(40px) rotate(-2deg); }
    to   { opacity:1; transform: translateY(0) rotate(0deg); }
  }
  .tombstone:hover {
    transform: translateY(-8px) scale(1.05);
    filter: drop-shadow(0 16px 28px rgba(0,0,0,0.8)) brightness(1.12);
  }

  /* container da imagem da lápide */
  .stone-img-wrap {
    position: relative;
    width: 160px;
    height: 244px;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 12px 28px rgba(0,0,0,0.9));
  }

  .stone-img-wrap img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: brightness(0.88) contrast(1.06);
    transition: filter 0.3s;
  }
  .tombstone:hover .stone-img-wrap img {
    filter: brightness(1.05) contrast(1.08);
  }

  /* texto sobreposto na área interna da lápide
     A lápide tem arco em cima (~20% do topo) e base/degraus (~24% embaixo)
     Laterais: a moldura ocupa ~18% de cada lado                          */
  .stone-text {
    position: absolute;
    top: 20%;
    left: 20%;
    right: 20%;
    bottom: 26%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    z-index: 2;
    pointer-events: none;
    overflow: hidden;
  }

  .book-title {
    font-family: 'IM Fell English', serif;
    font-size: 0.76rem;
    text-align: center;
    line-height: 1.38;
    word-break: break-word;
    hyphens: auto;
    /* 4 linhas máximo — esconde o excesso com fade */
    display: -webkit-box;
    -webkit-line-clamp: 5;
    -webkit-box-orient: vertical;
    overflow: hidden;
    width: 100%;
    /* efeito entalhado na pedra */
    color: #7a7a7a;
    text-shadow:
      1px 1px 0 rgba(255,255,255,0.10),
      -1px -1px 0 rgba(0,0,0,0.85),
      0 1px 5px rgba(0,0,0,0.7);
    letter-spacing: 0.3px;
    padding: 0 2px;
  }

  /* botão dar nova chance */
  .chance-btn {
    position: absolute;
    top: 4px;
    right: 22px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #1a3a1a;
    border: 1px solid #3d6e30;
    color: #7aaa70;
    font-size: 0.65rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 10;
    line-height: 1;
  }
  .tombstone-wrap:hover .chance-btn { opacity: 1; }
  .tombstone-wrap.revived .chance-btn { opacity: 1; background: #2a4a1a; border-color: #5aaa40; }

  /* mão de caveira nos pés da lápide */
  .skull-hand {
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.3rem;
    display: none;
    filter: drop-shadow(0 0 6px rgba(100,200,80,0.6));
    animation: haunt 1.8s ease-in-out infinite alternate;
    z-index: 5;
  }
  .tombstone-wrap.revived .skull-hand { display: block; }
  @keyframes haunt {
    from { transform: translateX(-50%) translateY(0) rotate(-8deg); opacity: 0.75; }
    to   { transform: translateX(-50%) translateY(-5px) rotate(8deg); opacity: 1; }
  }

  /* botão remover */
  .delete-btn {
    position: absolute;
    top: 4px;
    right: 0px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--blood);
    border: 1px solid #a03030;
    color: #fff;
    font-size: 0.6rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 10;
  }
  .tombstone-wrap:hover .delete-btn { opacity: 1; }

  /* ══ PAINEL ══ */
  #panel {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: min(500px, 96vw);
    z-index: 100;
  }
  .panel-tab { display: flex; justify-content: center; }
  .panel-toggle {
    background: linear-gradient(135deg, #252920, #181c14);
    border: 1px solid #3d5c30;
    border-bottom: none;
    color: var(--gold);
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: 1rem;
    padding: 0.5rem 1.8rem;
    cursor: pointer;
    border-radius: 8px 8px 0 0;
    letter-spacing: 1px;
    transition: background 0.2s;
  }
  .panel-toggle:hover { background: linear-gradient(135deg, #303626, #20251a); }

  .panel-body {
    background: linear-gradient(160deg, rgba(20,26,16,0.97), rgba(13,18,10,0.98));
    border: 1px solid #3d5c30;
    border-radius: 12px 12px 0 0;
    padding: 1.4rem;
    display: none;
    backdrop-filter: blur(10px);
    box-shadow: 0 -8px 36px rgba(0,0,0,0.55);
  }
  .panel-body.open { display: block; }

  .panel-body h2 {
    font-family: 'UnifrakturMaguntia', cursive;
    color: var(--gold);
    font-size: 1.3rem;
    margin-bottom: 1rem;
    text-align: center;
    text-shadow: 0 0 14px rgba(201,168,76,0.4);
  }
  .form-row { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 0.9rem; }
  .form-row label { font-size: 0.75rem; color: #7a9870; letter-spacing: 1px; text-transform: uppercase; }
  .form-row input {
    background: rgba(255,255,255,0.04);
    border: 1px solid #2e4825;
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
    color: #d4cfc8;
    font-family: 'IM Fell English', serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-row input:focus { border-color: var(--gold); }
  .form-row input::placeholder { color: #3a4e32; font-style: italic; }

  .bury-btn {
    width: 100%;
    padding: 0.65rem;
    background: linear-gradient(135deg, #38281a, #58381a);
    border: 1px solid var(--gold);
    border-radius: 8px;
    color: var(--gold);
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: 1.05rem;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .bury-btn:hover {
    background: linear-gradient(135deg, #583820, #784e18);
    box-shadow: 0 0 18px rgba(201,168,76,0.28);
  }
  .counter {
    text-align: center;
    margin-top: 0.7rem;
    font-size: 0.78rem;
    color: #4a6040;
    font-style: italic;
  }

  .backup-btn {
    width: 100%;
    padding: 0.5rem;
    margin-top: 0.6rem;
    background: linear-gradient(135deg, #1a2a1a, #2a3820);
    border: 1px solid #3d5c30;
    border-radius: 8px;
    color: #7a9870;
    font-family: 'IM Fell English', serif;
    font-size: 0.85rem;
    font-style: italic;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .backup-btn:hover { background: linear-gradient(135deg, #22381a, #344825); color: var(--gold); }

  .backup-area {
    display: none;
    margin-top: 0.8rem;
  }
  .backup-area.open { display: block; }
  .backup-area label { font-size: 0.7rem; color: #5a7850; letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 0.4rem; }
  .backup-area textarea {
    width: 100%;
    height: 120px;
    background: rgba(255,255,255,0.03);
    border: 1px solid #2e4825;
    border-radius: 6px;
    padding: 0.5rem;
    color: #9aaf90;
    font-family: monospace;
    font-size: 0.75rem;
    resize: none;
    outline: none;
  }
  .backup-actions { display: flex; gap: 0.5rem; margin-top: 0.4rem; }
  .backup-copy-btn, .backup-import-btn {
    flex: 1;
    padding: 0.4rem;
    border-radius: 6px;
    border: 1px solid #2e4825;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .backup-copy-btn { background: #1a2a14; color: #7a9870; }
  .backup-copy-btn:hover { background: #243a1a; color: var(--gold); }
  .backup-import-btn { background: #1a1a2a; color: #7a7aaa; }
  .backup-import-btn:hover { background: #242438; color: #aaaada; }

  /* ══ TOAST ══ */
  .toast {
    position: fixed;
    top: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: rgba(18,24,14,0.96);
    border: 1px solid #3d5c30;
    border-radius: 8px;
    padding: 0.75rem 1.5rem;
    color: var(--gold);
    font-family: 'IM Fell English', serif;
    font-size: 0.9rem;
    font-style: italic;
    z-index: 999;
    transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="bg"></div>

<header>
  <h1>☠ DNF Graveyard ☠</h1>
  <p>Aqui jazem os livros que não sobreviveram ao meu TBR</p>
</header>

<div id="graveyard">
  <p class="empty-msg" id="emptyMsg">O cemitério está vazio… por enquanto. ⚰</p>
</div>

<div class="toast" id="toast"></div>

<div id="panel">
  <div class="panel-tab">
    <button class="panel-toggle" onclick="togglePanel()">⚰ Enterrar um Livro ⚰</button>
  </div>
  <div class="panel-body" id="panelBody">
    <h2>Registrar Abandono</h2>
    <div class="form-row">
      <label>Título da Obra</label>
      <input type="text" id="inputTitle" placeholder="Ex: O Nome do Vento..." maxlength="60">
    </div>
    <div class="form-row">
      <label>Link (Goodreads, Amazon, etc.)</label>
      <input type="url" id="inputUrl" placeholder="https://www.goodreads.com/book/...">
    </div>
    <button class="bury-btn" onclick="buryBook()">⚰ Dar Adeus &amp; Enterrar</button>
    <p class="counter" id="counter"></p>

    <button class="backup-btn" onclick="toggleBackup()">📋 Backup / Restaurar Dados</button>
    <div class="backup-area" id="backupArea">
      <label>Código de backup (compatível com Notion)</label>
      <textarea id="backupText" spellcheck="false" placeholder="Cole aqui um backup para restaurar, ou gere um novo abaixo..."></textarea>
      <div class="backup-actions">
        <button class="backup-copy-btn" onclick="generateBackup()">⬇ Gerar &amp; Copiar</button>
        <button class="backup-import-btn" onclick="importBackup()">⬆ Importar Backup</button>
      </div>
    </div>
  </div>
</div>

JcZdj6hGfx+tXgWyD2ACUA7f1+O5j89gN3/C6zmC1/4gvzkJz/JX/ziF9P/Bo2rMfFfxFxEAAAAAElFTkSuQmCC';

  const STORAGE_KEY = 'dnf_graveyard_books';

  function loadBooks() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }
  function saveBooks(b) { localStorage.setItem(STORAGE_KEY, JSON.stringify(b)); }

  function togglePanel() {
    document.getElementById('panelBody').classList.toggle('open');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3200);
  }

  function render() {
    const books = loadBooks();
    const yard  = document.getElementById('graveyard');
    const empty = document.getElementById('emptyMsg');
    const counter = document.getElementById('counter');

    [...yard.querySelectorAll('.tombstone-wrap')].forEach(el => el.remove());

    if (books.length === 0) {
      empty.style.display = 'block';
      counter.textContent = '';
      return;
    }

    empty.style.display = 'none';
    counter.textContent = books.length + ' obra' + (books.length > 1 ? 's' : '') +
      ' abandonada' + (books.length > 1 ? 's' : '') +
      ' aqui jaz' + (books.length > 1 ? 'em' : '');

    books.forEach((book, idx) => {
      const wrap = document.createElement('div');
      wrap.className = 'tombstone-wrap';

      const chanceBtn = document.createElement('button');
      chanceBtn.className = 'chance-btn';
      chanceBtn.title = 'Dar uma nova chance!';
      chanceBtn.innerHTML = '✓';
      chanceBtn.onclick = (e) => {
        e.preventDefault(); e.stopPropagation();
        wrap.classList.toggle('revived');
        chanceBtn.title = wrap.classList.contains('revived') ? 'Cancelar nova chance' : 'Dar uma nova chance!';
        if (wrap.classList.contains('revived')) showToast('🤚 Uma mão do além reclama \"' + book.title + '\"...');
      };

      const skulls = document.createElement('div');
      skulls.className = 'skull-hand';
      skulls.innerHTML = '🤚';


      del.className = 'delete-btn';
      del.title = 'Remover';
      del.innerHTML = '✕';
      del.onclick = (e) => { e.preventDefault(); e.stopPropagation(); removeBook(idx); };

      const link = document.createElement('a');
      link.className = 'tombstone';
      link.href = book.url || '#';
      link.target = book.url ? '_blank' : '_self';
      link.rel = 'noopener noreferrer';
      link.title = 'Visitar: ' + book.title;
      link.style.animationDelay = (idx * 0.08) + 's';

      link.innerHTML = `
        <div class="stone-img-wrap">
          <img src="${STONE_IMG}" alt="lápide">
          <div class="stone-text">
            <span class="book-title">${escHtml(book.title)}</span>
          </div>
        </div>
      `;

      wrap.appendChild(skulls);
      wrap.appendChild(chanceBtn);
      wrap.appendChild(del);
      wrap.appendChild(link);
      yard.appendChild(wrap);
    });
  }

  function buryBook() {
    const titleEl = document.getElementById('inputTitle');
    const urlEl   = document.getElementById('inputUrl');
    const title   = titleEl.value.trim();
    const url     = urlEl.value.trim();

    if (!title) { showToast('⚠ Informe o título da obra!'); titleEl.focus(); return; }
    if (url && !isValidUrl(url)) { showToast('⚠ URL inválida. Verifique o link.'); urlEl.focus(); return; }

    const books = loadBooks();
    books.push({ title, url: url || '' });
    saveBooks(books);
    titleEl.value = '';
    urlEl.value   = '';
    render();
    showToast('"' + title + '" foi enterrado. Descanse em paz. ⚰');
  }

  function removeBook(idx) {
    const books = loadBooks();
    const removed = books.splice(idx, 1)[0];
    saveBooks(books);
    render();
    showToast('"' + removed.title + '" ressurgiu dos mortos!');
  }

  function toggleBackup() {
    const area = document.getElementById('backupArea');
    area.classList.toggle('open');
    if (area.classList.contains('open')) generateBackup();
  }

  function generateBackup() {
    const books = loadBooks();
    // Formato Notion-compatível: tabela markdown
    let md = '| # | Título | Link | Status |\n';
    md    += '|---|--------|------|--------|\n';
    books.forEach((b, i) => {
      const link = b.url ? `[ver obra](${b.url})` : '-';
      md += `| ${i+1} | ${b.title.replace(/\|/g,'\\|')} | ${link} | DNF ☠ |\n`;
    });
    if (books.length === 0) md = '*(cemitério vazio — nenhum livro enterrado ainda)*';
    const ta = document.getElementById('backupText');
    ta.value = md;
    // copiar para clipboard
    if (navigator.clipboard) {
      navigator.clipboard.writeText(md).then(() => showToast('📋 Backup copiado para a área de transferência!'));
    } else {
      ta.select();
      document.execCommand('copy');
      showToast('📋 Backup copiado!');
    }
  }

  function importBackup() {
    const raw = document.getElementById('backupText').value.trim();
    if (!raw) { showToast('⚠ Cole um backup no campo de texto primeiro.'); return; }
    const lines = raw.split('\n').filter(l => l.startsWith('|'));
    // pular cabeçalho e separador
    const dataLines = lines.filter(l => !l.includes('---') && !l.startsWith('| #'));
    if (dataLines.length === 0) { showToast('⚠ Nenhum dado encontrado no backup.'); return; }
    const imported = [];
    dataLines.forEach(line => {
      const cols = line.split('|').map(c => c.trim()).filter(c => c !== '');
      if (cols.length >= 2) {
        const title = cols[1];
        let url = '';
        if (cols[2] && cols[2] !== '-') {
          const m = cols[2].match(/\[.*?\]\((.*?)\)/);
          url = m ? m[1] : cols[2];
        }
        if (title && title !== 'Título') imported.push({ title, url: url || '' });
      }
    });
    if (imported.length === 0) { showToast('⚠ Não foi possível interpretar o backup.'); return; }
    saveBooks(imported);
    render();
    document.getElementById('backupArea').classList.remove('open');
    showToast('✅ ' + imported.length + ' obra(s) restaurada(s) com sucesso!');
  }

  function isValidUrl(s) {
    try { new URL(s); return true; } catch { return false; }
  }
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('panelBody').classList.contains('open')) buryBook();
  });

  render();
</script>
