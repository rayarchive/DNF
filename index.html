<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNF Graveyard 📚☠️</title>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  /* ══ VARIÁVEIS AUTOMÁTICAS POR SISTEMA ══ */
  :root {
    --gold: #c9a84c;
    --blood: #7a1a1a;
    --parchment: #f0e8d0;

    /* DARK padrão */
    --bg: #0e100d;
    --bg-radial-inner: #0d1a0a;
    --bg-radial-mid: #060a05;
    --bg-radial-outer: #020402;
    --bg-panel: rgba(20,26,16,0.97);
    --bg-panel2: rgba(13,18,10,0.98);
    --text-main: #d4cfc8;
    --text-sub: #7a987a;
    --text-label: #7a9870;
    --border: #3d5c30;
    --border-dim: #2e4825;
    --input-bg: rgba(255,255,255,0.04);
    --input-color: #d4cfc8;
    --placeholder: #3a4e32;
    --empty-color: #4a6042;
    --counter-color: #4a6040;
    --toast-bg: rgba(18,24,14,0.96);
    --header-sub: #7a987a;
    --book-title: #7a7a7a;
    --backup-textarea-color: #9aaf90;
    --toggle-bg1: #252920;
    --toggle-bg2: #181c14;
    --h1-color: #f0e8d0;
    --h1-shadow: 0 0 28px rgba(201,168,76,0.55), 2px 2px 0 #000;
    --stone-filter: brightness(0.88) contrast(1.06);
    --stone-wrap-shadow: drop-shadow(0 12px 28px rgba(0,0,0,0.9));
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #e8e2d5;
      --bg-radial-inner: #d5cebc;
      --bg-radial-mid: #e8e2d0;
      --bg-radial-outer: #f0eadc;
      --bg-panel: rgba(240,235,220,0.97);
      --bg-panel2: rgba(230,225,210,0.98);
      --text-main: #2a2218;
      --text-sub: #5a4e2a;
      --text-label: #4a6030;
      --border: #8a9870;
      --border-dim: #7a8860;
      --input-bg: rgba(0,0,0,0.04);
      --input-color: #2a2218;
      --placeholder: #8a9878;
      --empty-color: #5a6842;
      --counter-color: #5a6840;
      --toast-bg: rgba(240,235,215,0.97);
      --header-sub: #5a7040;
      --book-title: #4a4a4a;
      --backup-textarea-color: #3a5030;
      --toggle-bg1: #d8d2c0;
      --toggle-bg2: #c8c2b0;
      --h1-color: #2a1a0a;
      --h1-shadow: 0 0 18px rgba(201,168,76,0.4), 1px 1px 0 rgba(255,255,255,0.5);
      --stone-filter: brightness(0.75) contrast(1.1) sepia(0.2);
      --stone-wrap-shadow: drop-shadow(0 8px 18px rgba(0,0,0,0.5));
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    font-family: 'IM Fell English', serif;
    color: var(--text-main);
    overflow-x: hidden;
    background-color: var(--bg);
  }

  .bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 100%, var(--bg-radial-inner) 0%, var(--bg-radial-mid) 60%, var(--bg-radial-outer) 100%);
    z-index: -2;
  }

  /* ══ HEADER ══ */
  header {
    text-align: center;
    padding: 2.5rem 1rem 0.8rem;
  }
  header h1 {
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: clamp(1.8rem, 5.5vw, 4rem);
    color: var(--h1-color);
    text-shadow: var(--h1-shadow);
    letter-spacing: 2px;
  }
  header p {
    font-style: italic;
    color: var(--header-sub);
    margin-top: 0.4rem;
    font-size: 0.95rem;
    letter-spacing: 1px;
  }

  /* ══ GRAVEYARD ══ */
  #graveyard {
    display: flex;
    flex-wrap: wrap;
    gap: 2rem 1.5rem;
    justify-content: center;
    padding: 2rem 1rem 8rem;
    min-height: 300px;
    align-items: flex-end;
  }

  .empty-msg {
    font-style: italic;
    color: var(--empty-color);
    font-size: 1.05rem;
    text-align: center;
    width: 100%;
    padding: 3rem;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    animation: pulse 3s ease-in-out infinite;
    align-self: center;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.9} }

  /* ══ LÁPIDE ══ */
  .tombstone-wrap {
    position: relative;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
  }

  .tombstone {
    width: clamp(120px, 18vw, 160px);
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    animation: riseUp 0.65s cubic-bezier(0.16,1,0.3,1) both;
    position: relative;
  }
  @keyframes riseUp {
    from { opacity:0; transform: translateY(40px) rotate(-2deg); }
    to   { opacity:1; transform: translateY(0) rotate(0deg); }
  }
  .tombstone:hover {
    transform: translateY(-8px) scale(1.05);
    filter: drop-shadow(0 16px 28px rgba(0,0,0,0.8)) brightness(1.12);
  }

  .stone-img-wrap {
    position: relative;
    width: clamp(120px, 18vw, 160px);
    height: clamp(183px, 27.5vw, 244px);
    display: flex;
    align-items: center;
    justify-content: center;
    filter: var(--stone-wrap-shadow);
  }

  .stone-img-wrap img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: var(--stone-filter);
    transition: filter 0.3s;
  }
  .tombstone:hover .stone-img-wrap img {
    filter: brightness(1.05) contrast(1.08);
  }

  .stone-text {
    position: absolute;
    top: 20%;
    left: 20%;
    right: 20%;
    bottom: 26%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    z-index: 2;
    pointer-events: none;
    overflow: hidden;
  }

  .book-title {
    font-family: 'IM Fell English', serif;
    font-size: clamp(0.6rem, 1.2vw, 0.76rem);
    text-align: center;
    line-height: 1.38;
    word-break: break-word;
    hyphens: auto;
    display: -webkit-box;
    -webkit-line-clamp: 5;
    -webkit-box-orient: vertical;
    overflow: hidden;
    width: 100%;
    color: var(--book-title);
    text-shadow:
      1px 1px 0 rgba(255,255,255,0.10),
      -1px -1px 0 rgba(0,0,0,0.85),
      0 1px 5px rgba(0,0,0,0.7);
    letter-spacing: 0.3px;
    padding: 0 2px;
  }

  /* ══ BOTÃO CHANCE ══ */
  .chance-btn {
    position: absolute;
    top: 4px;
    right: 22px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #1a3a1a;
    border: 1px solid #3d6e30;
    color: #7aaa70;
    font-size: 0.65rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 10;
    line-height: 1;
  }
  .tombstone-wrap:hover .chance-btn { opacity: 1; }
  .tombstone-wrap.revived .chance-btn { opacity: 1; background: #2a4a1a; border-color: #5aaa40; }

  /* ══ MÃO DE ZUMBI — MAIOR ══ */
  .zombie-hand {
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: clamp(64px, 10vw, 90px);
    height: clamp(100px, 13vw, 120px);
    display: none;
    z-index: 6;
    overflow: visible;
    pointer-events: none;
  }
  .zombie-hand img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    transform-origin: bottom center;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
  }
  .tombstone-wrap.revived .zombie-hand {
    display: block;
    animation: zombieRise 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  @keyframes zombieRise {
    from { transform: translateX(-50%) translateY(100%); opacity: 0; }
    to   { transform: translateX(-50%) translateY(0%);   opacity: 1; }
  }

  /* ══ BOTÃO DELETAR ══ */
  .delete-btn {
    position: absolute;
    top: 4px;
    right: 0px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--blood);
    border: 1px solid #a03030;
    color: #fff;
    font-size: 0.6rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 10;
  }
  .tombstone-wrap:hover .delete-btn { opacity: 1; }

  /* ══ PAINEL ══ */
  #panel {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: min(520px, 98vw);
    z-index: 100;
  }
  .panel-tab { display: flex; justify-content: center; }
  .panel-toggle {
    background: linear-gradient(135deg, var(--toggle-bg1), var(--toggle-bg2));
    border: 1px solid var(--border);
    border-bottom: none;
    color: var(--gold);
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: clamp(0.82rem, 2.5vw, 1rem);
    padding: 0.5rem clamp(0.8rem, 4vw, 1.8rem);
    cursor: pointer;
    border-radius: 8px 8px 0 0;
    letter-spacing: 1px;
    transition: background 0.2s;
  }
  .panel-toggle:hover { filter: brightness(1.1); }

  .panel-body {
    background: linear-gradient(160deg, var(--bg-panel), var(--bg-panel2));
    border: 1px solid var(--border);
    border-radius: 12px 12px 0 0;
    padding: clamp(0.9rem, 3vw, 1.4rem);
    display: none;
    backdrop-filter: blur(10px);
    box-shadow: 0 -8px 36px rgba(0,0,0,0.55);
    max-height: 80vh;
    overflow-y: auto;
  }
  .panel-body.open { display: block; }

  .panel-body h2 {
    font-family: 'UnifrakturMaguntia', cursive;
    color: var(--gold);
    font-size: clamp(1rem, 3.5vw, 1.3rem);
    margin-bottom: 1rem;
    text-align: center;
    text-shadow: 0 0 14px rgba(201,168,76,0.4);
  }
  .form-row { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 0.9rem; }
  .form-row label { font-size: 0.75rem; color: var(--text-label); letter-spacing: 1px; text-transform: uppercase; }
  .form-row input {
    background: var(--input-bg);
    border: 1px solid var(--border-dim);
    border-radius: 6px;
    padding: 0.55rem 0.75rem;
    color: var(--input-color);
    font-family: 'IM Fell English', serif;
    font-size: clamp(0.85rem, 2.5vw, 0.9rem);
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .form-row input:focus { border-color: var(--gold); }
  .form-row input::placeholder { color: var(--placeholder); font-style: italic; }

  .bury-btn {
    width: 100%;
    padding: 0.65rem;
    background: linear-gradient(135deg, #38281a, #58381a);
    border: 1px solid var(--gold);
    border-radius: 8px;
    color: var(--gold);
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: clamp(0.9rem, 3vw, 1.05rem);
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .bury-btn:hover {
    background: linear-gradient(135deg, #583820, #784e18);
    box-shadow: 0 0 18px rgba(201,168,76,0.28);
  }
  .counter {
    text-align: center;
    margin-top: 0.7rem;
    font-size: 0.78rem;
    color: var(--counter-color);
    font-style: italic;
  }

  .backup-btn {
    width: 100%;
    padding: 0.5rem;
    margin-top: 0.6rem;
    background: linear-gradient(135deg, #1a2a1a, #2a3820);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-label);
    font-family: 'IM Fell English', serif;
    font-size: 0.85rem;
    font-style: italic;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .backup-btn:hover { filter: brightness(1.2); color: var(--gold); }

  .backup-area { display: none; margin-top: 0.8rem; }
  .backup-area.open { display: block; }
  .backup-area label { font-size: 0.7rem; color: var(--text-label); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 0.4rem; }
  .backup-area textarea {
    width: 100%;
    height: 110px;
    background: var(--input-bg);
    border: 1px solid var(--border-dim);
    border-radius: 6px;
    padding: 0.5rem;
    color: var(--backup-textarea-color);
    font-family: monospace;
    font-size: 0.75rem;
    resize: none;
    outline: none;
  }
  .backup-actions { display: flex; gap: 0.5rem; margin-top: 0.4rem; }
  .backup-copy-btn, .backup-import-btn {
    flex: 1;
    padding: 0.45rem;
    border-radius: 6px;
    border: 1px solid var(--border-dim);
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .backup-copy-btn { background: #1a2a14; color: #7a9870; }
  .backup-copy-btn:hover { background: #243a1a; color: var(--gold); }
  .backup-import-btn { background: #1a1a2a; color: #7a7aaa; }
  .backup-import-btn:hover { background: #242438; color: #aaaada; }

  /* ══ TOAST ══ */
  .toast {
    position: fixed;
    top: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--toast-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1.5rem;
    color: var(--gold);
    font-family: 'IM Fell English', serif;
    font-size: clamp(0.78rem, 2.5vw, 0.9rem);
    font-style: italic;
    z-index: 999;
    transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
    white-space: nowrap;
    max-width: 90vw;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    header { padding: 2rem 0.8rem 0.5rem; }
    #graveyard { gap: 1.5rem 1rem; padding: 1.5rem 0.5rem 7rem; }
    .panel-body { padding: 1rem; }
    .zombie-hand { width: 55px; height: 80px; }
  }
  @media (max-width: 360px) {
    .tombstone { width: 110px; }
    .stone-img-wrap { width: 110px; height: 168px; }
  }
</style>
</head>
<body>

<div class="bg"></div>

<header>
  <h1>☠ DNF Graveyard ☠</h1>
  <p>Aqui jazem os livros que não sobreviveram ao meu TBR</p>
</header>

<div id="graveyard">
  <p class="empty-msg" id="emptyMsg">O cemitério está vazio… por enquanto. ⚰</p>
</div>

<div class="toast" id="toast"></div>

<div id="panel">
  <div class="panel-tab">
    <button class="panel-toggle" onclick="togglePanel()">⚰ Enterrar um Livro ⚰</button>
  </div>
  <div class="panel-body" id="panelBody">
    <h2>Registrar Abandono</h2>
    <div class="form-row">
      <label>Título da Obra</label>
      <input type="text" id="inputTitle" placeholder="Ex: O Nome do Vento..." maxlength="60">
    </div>
    <div class="form-row">
      <label>Link (Goodreads, Amazon, etc.)</label>
      <input type="url" id="inputUrl" placeholder="https://www.goodreads.com/book/...">
    </div>
    <button class="bury-btn" onclick="buryBook()">⚰ Dar Adeus &amp; Enterrar</button>
    <p class="counter" id="counter"></p>

    <button class="backup-btn" onclick="toggleBackup()">📋 Backup / Restaurar Dados</button>
    <div class="backup-area" id="backupArea">
      <label>Código de backup (compatível com Notion)</label>
      <textarea id="backupText" spellcheck="false" placeholder="Cole aqui um backup para restaurar, ou gere um novo abaixo..."></textarea>
      <div class="backup-actions">
        <button class="backup-copy-btn" onclick="generateBackup()">⬇ Gerar &amp; Copiar</button>
        <button class="backup-import-btn" onclick="importBackup()">⬆ Importar Backup</button>
      </div>
    </div>
  </div>
</div>

  const ZOMBIE_HAND_URL = 'https://images.vexels.com/media/users/3/269262/isolated/preview/72b3b1d14a3808a19e5e3af5bf717afd-a-mao-do-zumbi-saindo-do-chao.png';

  function loadBooks() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }
  function saveBooks(b) { localStorage.setItem(STORAGE_KEY, JSON.stringify(b)); }

  function togglePanel() {
    document.getElementById('panelBody').classList.toggle('open');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3200);
  }

  function render() {
    const books   = loadBooks();
    const yard    = document.getElementById('graveyard');
    const empty   = document.getElementById('emptyMsg');
    const counter = document.getElementById('counter');

    [...yard.querySelectorAll('.tombstone-wrap')].forEach(el => el.remove());

    if (books.length === 0) {
      empty.style.display = 'block';
      counter.textContent = '';
      return;
    }

    empty.style.display = 'none';
    counter.textContent = books.length + ' obra' + (books.length > 1 ? 's' : '') +
      ' abandonada' + (books.length > 1 ? 's' : '') +
      ' aqui jaz' + (books.length > 1 ? 'em' : '');

    books.forEach((book, idx) => {
      const wrap = document.createElement('div');
      wrap.className = 'tombstone-wrap';

      const chanceBtn = document.createElement('button');
      chanceBtn.className = 'chance-btn';
      chanceBtn.title = 'Dar uma nova chance!';
      chanceBtn.innerHTML = '✓';
      chanceBtn.onclick = (e) => {
        e.preventDefault(); e.stopPropagation();
        wrap.classList.toggle('revived');
        chanceBtn.title = wrap.classList.contains('revived') ? 'Cancelar nova chance' : 'Dar uma nova chance!';
        if (wrap.classList.contains('revived')) {
          showToast('🧟 Uma mão do além reclama "' + book.title + '"...');
        }
      };

      const zombieHand = document.createElement('div');
      zombieHand.className = 'zombie-hand';
      const handImg = document.createElement('img');
      handImg.src = ZOMBIE_HAND_URL;
      handImg.alt = 'mão de zumbi';
      handImg.crossOrigin = 'anonymous';
      zombieHand.appendChild(handImg);

      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.title = 'Remover';
      del.innerHTML = '✕';
      del.onclick = (e) => { e.preventDefault(); e.stopPropagation(); removeBook(idx); };

      const link = document.createElement('a');
      link.className = 'tombstone';
      link.href = book.url || '#';
      link.target = book.url ? '_blank' : '_self';
      link.rel = 'noopener noreferrer';
      link.title = 'Visitar: ' + book.title;
      link.style.animationDelay = (idx * 0.08) + 's';

      link.innerHTML = `
        <div class="stone-img-wrap">
          <img src="${STONE_IMG}" alt="lápide">
          <div class="stone-text">
            <span class="book-title">${escHtml(book.title)}</span>
          </div>
        </div>
      `;

      wrap.appendChild(zombieHand);
      wrap.appendChild(chanceBtn);
      wrap.appendChild(del);
      wrap.appendChild(link);
      yard.appendChild(wrap);
    });
  }

  function buryBook() {
    const titleEl = document.getElementById('inputTitle');
    const urlEl   = document.getElementById('inputUrl');
    const title   = titleEl.value.trim();
    const url     = urlEl.value.trim();

    if (!title) { showToast('⚠ Informe o título da obra!'); titleEl.focus(); return; }
    if (url && !isValidUrl(url)) { showToast('⚠ URL inválida. Verifique o link.'); urlEl.focus(); return; }

    const books = loadBooks();
    books.push({ title, url: url || '' });
    saveBooks(books);
    titleEl.value = '';
    urlEl.value   = '';
    render();
    showToast('"' + title + '" foi enterrado. Descanse em paz. ⚰');
  }

  function removeBook(idx) {
    const books = loadBooks();
    const removed = books.splice(idx, 1)[0];
    saveBooks(books);
    render();
    showToast('"' + removed.title + '" ressurgiu dos mortos!');
  }

  function toggleBackup() {
    const area = document.getElementById('backupArea');
    area.classList.toggle('open');
    if (area.classList.contains('open')) generateBackup();
  }

  function generateBackup() {
    const books = loadBooks();
    let md = '| # | Título | Link | Status |\n';
    md    += '|---|--------|------|--------|\n';
    books.forEach((b, i) => {
      const link = b.url ? `[ver obra](${b.url})` : '-';
      md += `| ${i+1} | ${b.title.replace(/\|/g,'\\|')} | ${link} | DNF ☠ |\n`;
    });
    if (books.length === 0) md = '*(cemitério vazio — nenhum livro enterrado ainda)*';
    const ta = document.getElementById('backupText');
    ta.value = md;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(md).then(() => showToast('📋 Backup copiado para a área de transferência!'));
    } else {
      ta.select();
      document.execCommand('copy');
      showToast('📋 Backup copiado!');
    }
  }

  function importBackup() {
    const raw = document.getElementById('backupText').value.trim();
    if (!raw) { showToast('⚠ Cole um backup no campo de texto primeiro.'); return; }
    const lines = raw.split('\n').filter(l => l.startsWith('|'));
    const dataLines = lines.filter(l => !l.includes('---') && !l.startsWith('| #'));
    if (dataLines.length === 0) { showToast('⚠ Nenhum dado encontrado no backup.'); return; }
    const imported = [];
    dataLines.forEach(line => {
      const cols = line.split('|').map(c => c.trim()).filter(c => c !== '');
      if (cols.length >= 2) {
        const title = cols[1];
        let url = '';
        if (cols[2] && cols[2] !== '-') {
          const m = cols[2].match(/\[.*?\]\((.*?)\)/);
          url = m ? m[1] : cols[2];
        }
        if (title && title !== 'Título') imported.push({ title, url: url || '' });
      }
    });
    if (imported.length === 0) { showToast('⚠ Não foi possível interpretar o backup.'); return; }
    saveBooks(imported);
    render();
    document.getElementById('backupArea').classList.remove('open');
    showToast('✅ ' + imported.length + ' obra(s) restaurada(s) com sucesso!');
  }

  function isValidUrl(s) {
    try { new URL(s); return true; } catch { return false; }
  }
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('panelBody').classList.contains('open')) buryBook();
  });

  render();
</script>
</body>
</html>
